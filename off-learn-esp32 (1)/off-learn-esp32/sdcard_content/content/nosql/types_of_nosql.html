    <h1 style="color: #0f172a; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; margin-top: 0;">Types of NoSQL Databases</h1>
    <h2 style="color: #0ea5e9; margin-top: 24px; font-size: 1.4rem;">Definition</h2>
    <p>Because "NoSQL" simply means "Not traditional SQL," it acts as an umbrella term for four distinct and fundamentally different architectures aimed at solving specific big-data performance bottlenecks: <strong>Document</strong>, <strong>Key-Value</strong>, <strong>Column-Family</strong>, and <strong>Graph</strong> databases.</p>
